name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify/publish (defaults to v<plugin.json version>)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, vctcn, linux, netbird, vctcn-runner]
    container:
      image: catthehacker/ubuntu:act-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install GitHub CLI
        run: |
          set -euo pipefail
          if ! command -v gh >/dev/null 2>&1; then
            apt-get update
            apt-get install -y gh
          fi

      - name: Verify runner toolchain
        run: |
          set -euo pipefail
          gh --version
          go version

      - name: Resolve release tag
        id: release
        run: |
          set -euo pipefail
          MANIFEST_VERSION="$(awk -F'"' '/"version"/ {print $4; exit}' plugin.json)"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v${MANIFEST_VERSION}"
          fi
          TAG_VERSION="${RELEASE_TAG#v}"
          echo "manifest=${MANIFEST_VERSION} tag=${TAG_VERSION}"
          if [ "${MANIFEST_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::tag ${RELEASE_TAG} does not match plugin.json version ${MANIFEST_VERSION}" >&2
            exit 1
          fi
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build plugin bundle
        run: make dist

      - name: Locate bundle
        id: bundle
        run: |
          set -euo pipefail
          BUNDLE="$(ls dist/fulcrum-*.tar.gz)"
          echo "path=${BUNDLE}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${BUNDLE}")" >> "$GITHUB_OUTPUT"
          sha256sum "${BUNDLE}" | tee "${BUNDLE}.sha256"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" \
              "${{ steps.bundle.outputs.path }}" \
              "${{ steps.bundle.outputs.path }}.sha256" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" \
              "${{ steps.bundle.outputs.path }}" \
              "${{ steps.bundle.outputs.path }}.sha256" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
